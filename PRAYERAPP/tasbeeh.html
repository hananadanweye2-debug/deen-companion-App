<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasbeeh Counter</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Amiri&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', Arial, sans-serif;
    background: #f1f5f9;
    text-align: center;
}

.container {
    margin-top: 80px;
}

.counter {
    font-size: 60px;
    margin: 20px 0;
}

button {
    padding: 15px 25px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
}

.tap {
    background: #22c55e;
    color: white;
}

.reset {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔢 Tasbeeh Counter</h2>

  <div id="count" class="counter">0</div>

  <button class="tap" onclick="increment()">Tap</button>
  <button class="reset" onclick="reset()">Reset</button>

  <div>
    <div>
  <p style="margin-top:20px; font-style:italic; color:#555;">“Remembrance of Allah brings peace to the heart.”</p>
</div>
  </div>

  <a href="index.html">⬅ Back</a>
</div>

<script>
let count = 0;

function increment() {
  count++;
  document.getElementById("count").innerText = count;
}

function reset() {
  count = 0;
  document.getElementById("count").innerText = count;
}
</script>


</body>
</html>
