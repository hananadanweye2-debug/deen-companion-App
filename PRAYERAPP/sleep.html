<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Sleep Adhkar</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Amiri&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', Arial, sans-serif;
    background: #f1f5f9;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    text-align: center;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

.result {
    margin-top: 20px;
    text-align: left;
}

.arabic {
    font-size: 20px;
    direction: rtl;
    margin-bottom: 10px;
}

.translation {
    font-size: 14px;
    color: #555;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>😴 Before Sleep Adhkar</h2>

  <div class="card">
    <h3>Select an Adhkar</h3>

    <select onchange="showAdhkar(this.value)">
      <option value="">-- Choose --</option>
      <option value="entry">Sleeping Dua</option>
      <option value="kursi">Ayat al-Kursi</option>
      <option value="quls">3 Quls</option>
      <option value="last2">Last 2 Verses of Baqarah</option>
      <option value="tasbeeh">Tasbeeh Before Sleep</option>
      <option value="protection">Protection Dua</option>
    </select>

    <div id="result" class="result"></div>
  </div>
</div>

<script>
function showAdhkar(value) {
  let content = "";

  if (value === "entry") {
    content = `
    <div class="arabic">
    بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا
    </div>
    <div class="translation">
    In Your name, O Allah, I die and I live.
    </div>
    `;
  }

  else if (value === "kursi") {
    content = `
    <div class="arabic">
    اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ،
    لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ،
    لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ،
    مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ،
    يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ،
    وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ،
    وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ،
    وَلَا يَئُودُهُ حِفْظُهُمَا،
    وَهُوَ الْعَلِيُّ الْعَظِيمُ
    </div>
    <div class="translation">
    Allah! There is no deity except Him, the Ever-Living, the Sustainer of existence...
    His Kursi extends over the heavens and the earth, and their preservation does not tire Him.
    And He is the Most High, the Most Great.
    </div>
    `;
  }

  else if (value === "quls") {
    content = `
    <div class="arabic">
    قُلْ هُوَ اللَّهُ أَحَدٌ،
    اللَّهُ الصَّمَدُ،
    لَمْ يَلِدْ وَلَمْ يُولَدْ،
    وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ
    </div>
    <div class="translation">Surah Al-Ikhlas (3 times)</div>

    <div class="arabic">
    قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ،
    مِن شَرِّ مَا خَلَقَ،
    وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ،
    وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ،
    وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ
    </div>
    <div class="translation">Surah Al-Falaq (3 times)</div>

    <div class="arabic">
    قُلْ أَعُوذُ بِرَبِّ النَّاسِ،
    مَلِكِ النَّاسِ،
    إِلَٰهِ النَّاسِ،
    مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ،
    الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ،
    مِنَ الْجِنَّةِ وَالنَّاسِ
    </div>
    <div class="translation">Surah An-Nas (3 times)</div>
    `;
  }

  else if (value === "last2") {
    content = `
    <div class="arabic">
    آمَنَ الرَّسُولُ بِمَا أُنزِلَ إِلَيْهِ مِن رَّبِّهِ وَالْمُؤْمِنُونَ،
    كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ،
    لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِّن رُّسُلِهِ،
    وَقَالُوا سَمِعْنَا وَأَطَعْنَا،
    غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ

    لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا،
    لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ،
    رَبَّنَا لَا تُؤَاخِذْنَا إِن نَّسِينَا أَوْ أَخْطَأْنَا،
    رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِن قَبْلِنَا،
    رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ،
    وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا،
    أَنتَ مَوْلَانَا فَانصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ
    </div>
    <div class="translation">
    The Messenger has believed in what was revealed to him from his Lord, and [so have] the believers...
    Allah does not burden a soul beyond that it can bear...
    So pardon us, forgive us, and have mercy upon us. You are our Protector.
    </div>
    `;
  }

  else if (value === "tasbeeh") {
    content = `
    <div class="arabic">
    سُبْحَانَ اللَّهِ (33)  
    الْحَمْدُ لِلَّهِ (33)  
    اللَّهُ أَكْبَرُ (34)
    </div>
    <div class="translation">
    Say SubhanAllah 33 times, Alhamdulillah 33 times, and Allahu Akbar 34 times before sleeping.
    </div>
    `;
  }

  else if (value === "protection") {
    content = `
    <div class="arabic">
    اللَّهُمَّ أَسْلَمْتُ نَفْسِي إِلَيْكَ،
    وَفَوَّضْتُ أَمْرِي إِلَيْكَ،
    وَوَجَّهْتُ وَجْهِي إِلَيْكَ،
    وَأَلْجَأْتُ ظَهْرِي إِلَيْكَ،
    رَغْبَةً وَرَهْبَةً إِلَيْكَ،
    لَا مَلْجَأَ وَلَا مَنْجَا مِنْكَ إِلَّا إِلَيْكَ،
    آمَنْتُ بِكِتَابِكَ الَّذِي أَنزَلْتَ،
    وَبِنَبِيِّكَ الَّذِي أَرْسَلْتَ
    </div>
    <div class="translation">
    O Allah, I submit myself to You, entrust my affairs to You,
    turn my face to You, and rely completely upon You,
    hoping in You and fearing You.
    There is no refuge or escape from You except to You.
    I believe in Your Book and Your Prophet.
    </div>
    `;
  }

  document.getElementById("result").innerHTML = content;
}
</script>

</body>
</html>
