<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qibla Finder</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
}

.container {
    margin-top: 40px;
}

.compass {
    width: 220px;
    height: 220px;
    border: 6px solid white;
    border-radius: 50%;
    margin: 20px auto;
    position: relative;
}

.arrow {
    width: 6px;
    height: 100px;
    background: #22c55e;
    position: absolute;
    top: 10px;
    left: 50%;
    transform-origin: bottom;
    transition: transform 0.2s ease;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-size: 16px;
}

.info {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🧭 Qibla Finder</h2>

  <div class="compass">
    <div id="arrow" class="arrow"></div>
  </div>

  <button onclick="startQibla()">Find Qibla</button>

  <div class="info">
    <p id="status">Click to allow location</p>
    <p id="degree"></p>
  </div>

  <a href="index.html" style="color:white;">⬅ Back</a>
</div>

<script>
const kaabaLat = 21.4225;
const kaabaLng = 39.8262;

function toRadians(deg) {
  return deg * Math.PI / 180;
}

function toDegrees(rad) {
  return rad * 180 / Math.PI;
}

// Calculate Qibla direction
function getQiblaDirection(lat, lng) {
  const φ1 = toRadians(lat);
  const φ2 = toRadians(kaabaLat);
  const Δλ = toRadians(kaabaLng - lng);

  const y = Math.sin(Δλ);
  const x = Math.cos(φ1) * Math.tan(φ2) - Math.sin(φ1) * Math.cos(Δλ);

  return (toDegrees(Math.atan2(y, x)) + 360) % 360;
}

function startQibla() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(position => {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      const qibla = getQiblaDirection(lat, lng);

      document.getElementById("status").innerText = "Location detected ✔️";
      document.getElementById("degree").innerText = "Qibla Direction: " + Math.round(qibla) + "°";

      // Start compass
      window.addEventListener("deviceorientation", function(event) {
        let heading = event.alpha;

        let rotation = qibla - heading;

        document.getElementById("arrow").style.transform =
          "rotate(" + rotation + "deg)";
      });

    }, () => {
      document.getElementById("status").innerText = "Location permission denied ❌";
    });
  } else {
    document.getElementById("status").innerText = "Geolocation not supported ❌";
  }
}
</script>

</body>
</html>
