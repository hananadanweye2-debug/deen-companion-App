<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duas Library</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
<h2>🤲 Duas Library</h2>

<!-- Dua Selector -->
<div class="section">
  <h3>Select a Dua</h3>
  <select id="duaSelect" onchange="showDua()"></select>
</div>

<!-- Dua Display -->
<div class="section" id="duaDisplay">
  <div id="duaText" style="padding: 10px; line-height: 1.6; font-size: 16px;">
    Select a Dua from above
  </div>
</div>

</div>

<script>
const duaSelect = document.getElementById("duaSelect");
const duaText = document.getElementById("duaText");

// Full Dua Library
const duas = [
  ["Morning Dua",
   `اللّهـمَّ بِكَ أَصْبَـحْنا وَبِكَ أَمْسَيْنا وَبِكَ نَحْيا وَبِكَ نَمـوتُ وَإِلَيْكَ النُّشورُ
اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا اليَوْمِ فَتْحَهُ، وَنَصْرَهُ، وَنُورَهُ، وَبَرَكَتَهُ، وَهُداهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهِ وَشَرِّ مَا بَعْدَهُ`,
   `O Allah, by You we enter the morning and by You we enter the evening, and by You we live and die, and unto You is the resurrection.
O Allah, I ask You for the good of this day — its opening, victory, light, blessing, and guidance — and I seek refuge in You from the evil of this day and the evil after it.`],

  ["Evening Dua",
   `اللّهـمَّ بِكَ أَمْسَيْنا وَبِكَ أَصْبَحْنا وَبِكَ نَحْيا وَبِكَ نَموتُ وَإِلَيْكَ الْمَصيرُ
اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ فَتْحَهَا، وَنَصْرَهَا، وَنُورَهَا، وَبَرَكَتَهَا، وَهُدَاهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهَا وَشَرِّ مَا بَعْدَهَا`,
   `O Allah, by You we enter the evening and by You we enter the morning, and by You we live and die, and to You is the return.
O Allah, I ask You for the good of this night — its opening, victory, light, blessing, and guidance — and I seek refuge with You from the evil of this night and the evil after it.`],

  ["Before Sleep",
   `بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا`,
   `In Your name, O Allah, I die and I live.`],

  ["Travel Dua",
   `سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُونَ`,
   `Glory be to Him who has subjected this (vehicle) to us, and we could never have it (by our efforts). And indeed, to our Lord we will return.`],

  ["Forgiveness",
   `رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ وَلِلْمُؤْمِنِينَ يَوْمَ يَقُومُ الْحِسَابُ`,
   `My Lord, forgive me, my parents, and the believers on the Day when the reckoning will be established.`],

  ["Seeking Guidance",
   `اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ`,
   `Guide us to the Straight Path.`],

  ["Gratitude",
   `الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ`,
   `All praise is due to Allah, Lord of the worlds.`],

  ["Protection from Evil",
   `أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ`,
   `I seek refuge with Allah from the accursed Satan.`],

  ["Health and Healing",
   `اللَّهُمَّ اشْفِ نَفْسِي وَشِفَاءَ جَمِيعِ الْمُؤْمِنِينَ`,
   `O Allah, heal my soul and the souls of all believers.`],

  ["Patience",
   `رَبَّنَا أَفْرِغْ عَلَيْنَا صَبْرًا وَتَوَفَّنَا مُسْلِمِينَ`,
   `Our Lord, pour upon us patience and cause us to die as Muslims.`]
];
// Populate the dropdown
duas.forEach((d, i) => {
  let option = document.createElement("option");
  option.value = i;
  option.textContent = d[0];
  duaSelect.appendChild(option);
});

// Show selected Dua
window.showDua = function(){
  const index = duaSelect.value || 0;
  const d = duas[index];
  duaText.innerHTML = `<b>Arabic:</b><br>${d[1]}<br><br><b>English:</b><br>${d[2]}`;
}

showDua();

// Optional: schedule notifications (demo)
function scheduleDuaNotifications(duas) {
  duas.forEach((d, i) => {
    setTimeout(() => {
      if(Notification.permission === "granted") {
        new Notification(`Dua Reminder: ${d[0]}`, { body: d[2] });
      }
    }, i * 60000); // demo: 1 min apart
  });
}

// Request notification permission
if ("Notification" in window) {
  Notification.requestPermission().then(permission => {
    if (permission === "granted") {
      scheduleDuaNotifications(duas);
    }
  });
}

</script>
</body>
</html>
