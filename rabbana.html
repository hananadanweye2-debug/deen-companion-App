<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>40 Rabbana</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <h2>📖 40 Rabbana</h2>

  <div class="section">
    <h3>Select a Rabbana Dua</h3>
    <select id="rabbanaSelect" onchange="showRabbana()"></select>
  </div>

  <div class="section" id="rabbanaDisplay">
    <div id="rabbanaText" style="padding: 10px; line-height: 1.6; font-size: 16px;">
      Select a Dua from above
    </div>
  </div>
</div>

<script>
// Your Rabbana duas data here
const rabbanaDuas = [
["رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ",
 "Our Lord, give us good in this world and good in the Hereafter, and protect us from the punishment of the Fire."],

["رَبَّنَا لَا تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا وَهَبْ لَنَا مِن لَدُنْكَ رَحْمَةً إِنَّكَ أَنْتَ الْوَهَّابُ",
 "Our Lord, do not let our hearts deviate after You have guided us, and grant us mercy from Yourself. Indeed, You are the Bestower."],

["رَبَّنَا اغْفِرْ لَنَا ذُنُوبَنَا وَإِسْرَافَنَا فِي أَمْرِنَا وَثَبِّتْ أَقْدَامَنَا وَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ",
 "Our Lord, forgive us our sins and excesses, make firm our feet, and help us against the disbelieving people."],

["رَبَّنَا أَفْرِغْ عَلَيْنَا صَبْرًا وَتَوَفَّنَا مُسْلِمِينَ",
 "Our Lord, pour patience upon us and let us die as Muslims."],

["رَبَّنَا لَا تُؤَاخِذْنَا إِن نَّسِينَا أَوْ أَخْطَأْنَا",
 "Our Lord, do not punish us if we forget or make mistakes."],

["رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِن قَبْلِنَا",
 "Our Lord, do not place upon us a burden like that which You placed on those before us."],

["رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا",
 "Our Lord, do not burden us with what we cannot bear; forgive us, pardon us, and have mercy on us."],

["رَبَّنَا أَجِرْنَا مِنَ النَّارِ",
 "Our Lord, save us from the Fire."],

["رَبَّنَا لَا تُخْزِنَا يَوْمَ الْقِيَامَةِ",
 "Our Lord, do not disgrace us on the Day of Resurrection."],

["رَبَّنَا آمَنَّا فَاغْفِرْ لَنَا وَارْحَمْنَا وَأَنْتَ خَيْرُ الرَّاحِمِينَ",
 "Our Lord, we have believed, so forgive us and have mercy upon us. You are the best of the merciful."],

["رَبَّنَا وَاجْعَلْنَا مُسْلِمَيْنِ لَكَ وَمِنْ ذُرِّيَّتِنَا أُمَّةً مُسْلِمَةً لَكَ",
 "Our Lord, make us submissive to You and from our offspring a Muslim nation devoted to You."],

["رَبَّنَا وَاجْعَلْنَا مُهْتَدِينَ وَاجْعَلْنَا مِنَ الْمُفْلِحِينَ",
 "Our Lord, make us guided and among the successful."],

["رَبَّنَا لَا تَجْعَلْنَا فِتْنَةً لِلَّذِينَ كَفَرُوا وَاغْفِرْ لَنَا",
 "Our Lord, do not make us a trial for the disbelievers and forgive us."],

["رَبَّنَا اصْرِفْ عَنَّا عَذَابَ جَهَنَّمَ إِنَّ عَذَابَهَا كَانَ غَرَامًا",
 "Our Lord, turn away from us the punishment of Hell; indeed its punishment is severe."],

["رَبَّنَا لاَ تَجْعَلْنَا مَعَ الظَّالِمِينَ",
 "Our Lord, do not place us with the wrongdoers."],

["رَبَّنَا اجْعَلْنَا لِلْمُتَّقِينَ إِمَامًا",
 "Our Lord, make us leaders for the righteous."],

["رَبَّنَا اغْفِرْ لَنَا وَلِإِخْوَانِنَا الَّذِينَ سَبَقُونَا بِالإِيمَانِ",
 "Our Lord, forgive us and our brothers who preceded us in faith."],

["رَبَّنَا أَنزِلْ عَلَيْنَا مَائِدَةً مِّنَ السَّمَاء",
 "Our Lord, send down to us a table [spread with food] from heaven."],

["رَبَّنَا اغْفِرْ لِي وَلِوَالِدَيَّ وَلِلْمُؤْمِنِينَ",
 "Our Lord, forgive me, my parents, and all the believers."],

["رَبَّنَا آتِنَا مِن لَدُنْكَ رَحْمَةً وَهَيِّئْ لَنَا مِنْ أَمْرِنَا رَشَدًا",
 "Our Lord, grant us mercy from Yourself and guide us in our affairs."],

["رَبَّنَا تَقَبَّلْ دُعَاءَنَا",
 "Our Lord, accept our supplication."],

["رَبَّنَا صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ",
 "Our Lord, send blessings upon Muhammad and his family."],

["رَبَّنَا اجْمَعْ بَيْنَا وَبَيْنَ أَزْوَاجِنَا وَذُرِّيَّاتِنَا فِي الْجَنَّةِ",
 "Our Lord, unite us with our spouses and offspring in Paradise."],

["رَبَّنَا آمَنَّا بِمَا أَنْزَلْتَ وَاتَّبَعْنَا الرَّسُولَ فَاغْفِرْ لَنَا",
 "Our Lord, we believe in what You revealed and follow the Messenger, so forgive us."],

["رَبَّنَا إِنَّكَ جَامِعُ النَّاسِ لِيَوْمٍ لَا رَيْبَ فِيهِ",
 "Our Lord, indeed You will gather the people for a Day about which there is no doubt."],

["رَبَّنَا وَاجْمَعْنَا فِي الْجَنَّةِ",
 "Our Lord, unite us in Paradise."],

["رَبَّنَا فَاصْرِفْ عَنَّا سُوءَ الْعَمَلِ",
 "Our Lord, turn away from us the evil of deeds."],

["رَبَّنَا اغْفِرْ لَنَا وَارْحَمْنَا وَأَنْتَ خَيْرُ الرَّاحِمِينَ",
 "Our Lord, forgive us, have mercy upon us, and You are the best of the merciful."],

["رَبَّنَا أَجِرْنَا مِنَ الْكُفَّارِ وَالظَّالِمِينَ",
 "Our Lord, protect us from the disbelievers and wrongdoers."],

["رَبَّنَا أَخْرِجْنَا مِنَ الظُّلُمَاتِ إِلَى النُّورِ",
 "Our Lord, take us out of darkness into light."],

["رَبَّنَا رَبَّنَا اغْفِرْ لَنَا وَتُبْ عَلَيْنَا إِنَّكَ أَنْتَ التَّوَّابُ الرَّحِيمُ",
 "Our Lord, forgive us and accept our repentance; indeed You are the Accepter of Repentance, the Merciful."],

["رَبَّنَا اجْعَلْنَا مِنَ الصَّالِحِينَ",
 "Our Lord, make us among the righteous."],

["رَبَّنَا تَبَارَكْتَ وَتَعَالَيْتَ",
 "Our Lord, You are Blessed and Exalted."],

["رَبَّنَا هَبْ لَنَا مِنْ أَزْوَاجِنَا وَذُرِّيَّاتِنَا قُرَّةَ أَعْيُنٍ وَاجْعَلْنَا لِلْمُتَّقِينَ إِمَامًا",
 "Our Lord, grant us from our spouses and offspring comfort for the eyes and make us leaders for the righteous."],

["رَبَّنَا اغْفِرْ لَنَا وَلِوَالِدِينَا وَلِلْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ",
 "Our Lord, forgive us, our parents, all believing men and women."],

["رَبَّنَا إِنَّكَ رَؤُوفٌ رَحِيمٌ",
 "Our Lord, indeed You are Kind and Merciful."],

["رَبَّنَا إِنَّكَ الْحَكِيمُ الْعَظِيمُ",
 "Our Lord, indeed You are Wise and Great."],

["رَبَّنَا آتِنَا حُسْنَ الْخَاتِمَةِ وَاغْفِرْ لَنَا ذُنُوبَنَا",
 "Our Lord, grant us a good ending and forgive our sins."]

 ["رَبَّنَا اجعل قلوبنا خاشعة لذكرك",
 "Our Lord, make our hearts humble and devoted to Your remembrance."],

["رَبَّنَا اجعل أعمالنا خالصة لوجهك الكريم",
 "Our Lord, make our deeds sincere for Your Noble Face alone."]
 
 ["رَبَّنَا اجعلنا من الذين يستمعون القول فيتبعون أحسنه",
 "Our Lord, make us among those who listen to the words and follow the best of them."]
 
];
// Populate dropdown
const rabbanaSelect = document.getElementById("rabbanaSelect");
const rabbanaText = document.getElementById("rabbanaText");

rabbanaDuas.forEach((d, i) => {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = `Dua ${i+1}`;
  rabbanaSelect.appendChild(option);
});

function showRabbana() {
  const index = rabbanaSelect.value || 0;
  const dua = rabbanaDuas[index];
  rabbanaText.innerHTML = `<b>Arabic:</b><br>${dua[0]}<br><br><b>English:</b><br>${dua[1]}`;
}

// Show first dua by default
showRabbana();
</script>

</body>
</html>
