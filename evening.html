<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evening Adhkar</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Amiri&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', Arial, sans-serif;
    background: #f1f5f9;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    text-align: center;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

.result {
    margin-top: 20px;
    text-align: left;
}

.arabic {
    font-size: 20px;
    direction: rtl;
    margin-bottom: 10px;
}

.translation {
    font-size: 14px;
    color: #555;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🌙 Evening Adhkar Library</h2>

  <div class="card">
    <h3>Select an Adhkar</h3>

    <select onchange="showAdhkar(this.value)">
      <option value="">-- Choose --</option>
      <option value="entry">Evening Entry</option>
      <option value="ikhlas">3 Quls (Protection)</option>
      <option value="kursi">Ayat al-Kursi</option>
      <option value="protection">Protection Duas</option>
      <option value="forgiveness">Forgiveness</option>
      <option value="gratitude">Gratitude</option>
    </select>

    <div id="result" class="result"></div>
  </div>
</div>

<script>
function showAdhkar(value) {
  let content = "";

  if (value === "entry") {
    content = `
    <div class="arabic">
    أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ،
    لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ،
    رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا،
    وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا،
    رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ،
    رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ
    </div>
    <div class="translation">
    We have reached the evening and all sovereignty belongs to Allah. All praise is due to Allah.
    None has the right to be worshipped except Allah alone, without partner.
    To Him belongs the dominion and praise, and He is over all things capable.
    My Lord, I ask You for the good of this night and what follows it,
    and I seek refuge in You from the evil of this night and what follows it.
    My Lord, I seek refuge in You from laziness and bad old age,
    and I seek refuge in You from punishment in the Fire and punishment in the grave.
    </div>
    `;
  }

  else if (value === "ikhlas") {
    content = `
    <div class="arabic">
    قُلْ هُوَ اللَّهُ أَحَدٌ، اللَّهُ الصَّمَدُ،
    لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ
    </div>
    <div class="translation">Surah Al-Ikhlas (Recite 3 times)</div>

    <div class="arabic">
    قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ، مِن شَرِّ مَا خَلَقَ،
    وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ،
    وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ،
    وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ
    </div>
    <div class="translation">Surah Al-Falaq (3 times)</div>

    <div class="arabic">
    قُلْ أَعُوذُ بِرَبِّ النَّاسِ، مَلِكِ النَّاسِ،
    إِلَٰهِ النَّاسِ، مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ،
    الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ،
    مِنَ الْجِنَّةِ وَالنَّاسِ
    </div>
    <div class="translation">Surah An-Nas (3 times)</div>
    `;
  }

  else if (value === "kursi") {
    content = `
    <div class="arabic">
    اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ،
    لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ،
    لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ،
    مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ،
    يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ،
    وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ،
    وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ،
    وَلَا يَئُودُهُ حِفْظُهُمَا،
    وَهُوَ الْعَلِيُّ الْعَظِيمُ
    </div>
    <div class="translation">
    Ayat al-Kursi — Recite once for protection through the night.
    </div>
    `;
  }

  else if (value === "protection") {
    content = `
    <div class="arabic">
    بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ،
    وَهُوَ السَّمِيعُ الْعَلِيمُ
    </div>
    <div class="translation">In the name of Allah, with whose name nothing can harm. (3 times)</div>

    <div class="arabic">
    أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِن شَرِّ مَا خَلَقَ
    </div>
    <div class="translation">I seek refuge in the perfect words of Allah from what He created. (3 times)</div>
    `;
  }

  else if (value === "forgiveness") {
    content = `
    <div class="arabic">
    اللّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلاَّ أَنْتَ،
    خَلَقْتَنِي وَأَنَا عَبْدُكَ،
    وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ،
    أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ،
    أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ،
    وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي،
    فَإِنَّهُ لا يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ
    </div>
    <div class="translation">
    O Allah, You are my Lord, none has the right to be worshipped except You.
    You created me and I am Your servant...
    so forgive me, for none forgives sins except You.
    </div>
    `;
  }

  else if (value === "gratitude") {
    content = `
    <div class="arabic">
    اللّهُمَّ مَا أَمْسَى بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ،
    فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ،
    فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ
    </div>
    <div class="translation">
    O Allah, whatever blessing I or any of Your creation have received this evening,
    it is from You alone, without partner.
    So for You is all praise and thanks.
    </div>
    `;
  }

  document.getElementById("result").innerHTML = content;
}
</script>

</body>
</html>
