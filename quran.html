<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    margin: 0;
    padding: 0;
    text-align: center;
}

.container {
    max-width: 480px;
    margin: 40px auto;
}

h2 {
    margin-bottom: 20px;
}

.select-surah {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: left;
}

.arabic {
    font-size: 20px;
    direction: rtl;
    margin-bottom: 10px;
}

.translation {
    font-size: 14px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h2>📖 Quran</h2>

    <select class="select-surah" onchange="showSurah(this.value)">
        <option value="">-- Select Surah --</option>
        <option value="fatiha">Al-Fatiha</option>
        <option value="ikhlas">Al-Ikhlas</option>
        <option value="falaq">Al-Falaq</option>
        <option value="nas">An-Nas</option>
        <option value="baqarah-last2">Al-Baqarah Last 2 Verses</option>
    </select>

    <div id="result"></div>

    <a href="index.html">⬅ Back</a>
</div>

<script>
function showSurah(value) {
    let content = "";

    if (value === "fatiha") {
        content = `
        <div class="card">
            <div class="arabic">
            بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
            الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ
            الرَّحْمَٰنِ الرَّحِيمِ
            مَالِكِ يَوْمِ الدِّينِ
            إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ
            اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ
            صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ
            </div>
            <div class="translation">
            In the name of Allah, the Most Gracious, the Most Merciful.
            Praise be to Allah, Lord of the worlds.
            The Most Gracious, the Most Merciful.
            Master of the Day of Judgment.
            You alone we worship; You alone we ask for help.
            Guide us on the straight path.
            The path of those upon whom You have bestowed favor, not of those who have earned Your anger, nor of those who go astray.
            </div>
        </div>`;
    }

    else if (value === "ikhlas") {
        content = `
        <div class="card">
            <div class="arabic">
            قُلْ هُوَ اللَّهُ أَحَدٌ
            اللَّهُ الصَّمَدُ
            لَمْ يَلِدْ وَلَمْ يُولَدْ
            وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ
            </div>
            <div class="translation">
            Say, He is Allah, [Who is] One,
            Allah, the Eternal Refuge.
            He neither begets nor is born,
            Nor is there to Him any equivalent.
            </div>
        </div>`;
    }

    else if (value === "falaq") {
        content = `
        <div class="card">
            <div class="arabic">
            قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ
            مِن شَرِّ مَا خَلَقَ
            وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ
            وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ
            وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ
            </div>
            <div class="translation">
            Say, I seek refuge in the Lord of daybreak,
            From the evil of what He created,
            And from the evil of darkness when it settles,
            And from the evil of the blowers in knots,
            And from the evil of an envier when he envies.
            </div>
        </div>`;
    }

    else if (value === "nas") {
        content = `
        <div class="card">
            <div class="arabic">
            قُلْ أَعُوذُ بِرَبِّ النَّاسِ
            مَلِكِ النَّاسِ
            إِلَٰهِ النَّاسِ
            مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ
            الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ
            مِنَ الْجِنَّةِ وَالنَّاسِ
            </div>
            <div class="translation">
            Say, I seek refuge in the Lord of mankind,
            The Sovereign of mankind,
            The God of mankind,
            From the evil of the whisperer who withdraws,
            Who whispers in the breasts of mankind,
            Among jinn and mankind.
            </div>
        </div>`;
    }

    else if (value === "baqarah-last2") {
        content = `
        <div class="card">
            <div class="arabic">
            آمَنَ الرَّسُولُ بِمَا أُنزِلَ إِلَيْهِ مِن رَّبِّهِ وَالْمُؤْمِنُونَ
            كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ
            لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِّن رُّسُلِهِ
            وَقَالُوا سَمِعْنَا وَأَطَعْنَا
            غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ

            لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا
            لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ
            رَبَّنَا لَا تُؤَاخِذْنَا إِن نَّسِينَا أَوْ أَخْطَأْنَا
            رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِن قَبْلِنَا
            رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ
            وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا
            أَنتَ مَوْلَانَا فَانصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ
            </div>
            <div class="translation">
            The Messenger has believed in what was revealed to him from his Lord, and the believers too.
            Each of them believes in Allah, His angels, His books, and His messengers.
            We make no distinction between any of His messengers.
            They say: "We hear and obey; forgive us, our Lord, and to You is the final return."
            Allah does not burden a soul beyond that it can bear.
            For it is what it earned and upon it is what it committed.
            Our Lord, do not take us to task if we forget or make a mistake.
            Our Lord, do not burden us as You did those before us.
            Pardon us, forgive us, and have mercy upon us.
            You are our Protector, so help us against the disbelieving people.
            </div>
        </div>`;
    }

    document.getElementById("result").innerHTML = content;
}
</script>

</body>
</html>
